kind = "web"
previewPath = "/"
title = "Carnatic Analyzer"
version = "1.0.0"
id = "artifacts/carnatic-analyzer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25052

[services.development]
run = "pnpm --filter @workspace/carnatic-analyzer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/carnatic-analyzer", "run", "build" ]
publicDir = "artifacts/carnatic-analyzer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25052"
BASE_PATH = "/"
